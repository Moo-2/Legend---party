<!DOCTYPE html>
<html dir="rtl" lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Legend Party - The Fun Factory</title>
    <style>
        /* خلفية مبهجة بستايل كرتوني */
        body { 
            font-family: 'Cairo', sans-serif; 
            background: radial-gradient(circle, #fff7e6 0%, #ffeaa7 100%); 
            margin: 0; padding-bottom: 100px; 
        }
        
        header { text-align: center; padding: 25px; background: #fff; border-bottom: 5px solid #ff7675; }
        .logo { width: 120px; height: 120px; border-radius: 50%; border: 4px solid #ff7675; box-shadow: 0 5px 15px rgba(0,0,0,0.2); }
        
        .section-title { padding: 20px 15px; font-size: 20px; font-weight: bold; color: #d63031; text-align: center; }
        
        /* شبكة المتجر */
        .grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 15px; padding: 0 15px; }
        .box { background: white; padding: 10px; border-radius: 20px; text-align: center; box-shadow: 0 8px 0 #fab1a0; transition: 0.3s; }
        .box img { width: 100%; height: 110px; object-fit: cover; border-radius: 15px; }
        
        /* نظام البكيدجات الكرتوني */
        .pkg-container { padding: 0 15px; }
        .pkg { background: #74b9ff; color: white; padding: 15px; margin-bottom: 15px; border-radius: 20px; border: 3px dashed white; text-align: center; font-weight: bold; }
        .pkg.vip { background: #fdcb6e; color: #2d3436; }
        .pkg.legend { background: #e17055; }

        /* شريط التواصل */
        .contact-bar { display: flex; gap: 10px; padding: 15px; }
        .whatsapp-btn { flex: 3; background: #25D366; color: white; padding: 15px; border-radius: 50px; text-align: center; font-weight: bold; text-decoration: none; }
        .call-btn { flex: 1; background: #0984e3; color: white; padding: 15px; border-radius: 50%; text-align: center; font-weight: bold; }

        /* الشريط السفلي */
        .bottom-nav { position: fixed; bottom: 0; width: 100%; background: #2d3436; color: white; display: flex; justify-content: space-around; padding: 15px 0; z-index: 1000; }
    </style>
</head>
<body>

<header>
    <img src="5.png" class="logo" alt="Logo">
    <h1 style="color: #d63031;">LEGEND PARTY</h1>
</header>

<!-- قسم المتجر -->
<div id="storeSection">
    <div class="section-title">🎪 متجر الشخصيات 🎪</div>
    <div class="grid" id="menu"></div>
</div>

<!-- قسم البكيدجات -->
<div id="packageSection" style="display:none;">
    <div class="section-title">🎁 باقات الحفلات الاحترافية 🎁</div>
    <div class="pkg">العادي (Standard Package)</div>
    <div class="pkg vip">VIP (Special Experience)</div>
    <div class="pkg legend">LEGEND PARTY (Full Show)</div>
</div>

<!-- أزرار التواصل -->
<div class="contact-bar">
    <a href="https://wa.me/201148537547" class="whatsapp-btn">احجز حفلتك الآن 📱</a>
    <a href="tel:01148537547" class="call-btn">📞</a>
</div>

<!-- الشريط السفلي -->
<nav class="bottom-nav">
    <div onclick="showStore()">🛒 المتجر</div>
    <div onclick="showPackages()">🎁 البكيدجات</div>
</nav>

<script>
    function showStore() { document.getElementById('storeSection').style.display='block'; document.getElementById('packageSection').style.display='none'; }
    function showPackages() { document.getElementById('storeSection').style.display='none'; document.getElementById('packageSection').style.display='block'; }

    const store = [
        { en: "FOAM PARTY", ar: "فوم بارتي", img: "17.jpg" },
        { en: "BIRTHDAY", ar: "سبوع وأعياد ميلاد", img: "20.jpg" },
        { en: "CLOWN", ar: "كلاون", img: "21.jpg" },
        { en: "MASCOTS", ar: "مسكات", img: "22.jpg" },
        { en: "AFRICAN", ar: "شو أفريقي", img: "23.jpg" },
        { en: "ENGAGEMENT", ar: "خطوبة", img: "24.jpg" },
        { en: "JUMPERS", ar: "نطاطات", img: "25.jpg" }
    ];

    const menu = document.getElementById('menu');
    store.forEach(item => {
        menu.innerHTML += `<div class="box"><img src="${item.img}"><h3>${item.en}</h3><p>${item.ar}</p></div>`;
    });
</script>

</body>
</html>
