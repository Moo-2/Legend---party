<!DOCTYPE html>
<html dir="ltr" lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Legend Party</title>
    <style>
        body { font-family: sans-serif; background-color: #fff; margin: 0; padding-bottom: 100px; }
        header { text-align: center; padding: 20px; border-bottom: 2px solid #ff7675; }
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; padding: 10px; }
        .box { background: #fdfcfb; padding: 10px; border-radius: 15px; text-align: center; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        .box img { width: 100%; height: 100px; object-fit: cover; border-radius: 10px; }
        .bottom-nav { position: fixed; bottom: 0; width: 100%; background: #2d3436; color: white; display: flex; justify-content: space-around; padding: 15px 0; }
    </style>
</head>
<body>

<header>
    <h1>LEGEND PARTY</h1>
</header>

<div id="storeSection" class="grid">
    <div class="box"><img src="7.jpg"><h3>FOAM PARTY</h3></div>
    <div class="box"><img src="8.jpg"><h3>BIRTHDAY</h3></div>
</div>

<nav class="bottom-nav">
    <div>🛒 Store</div>
    <div>🏷️ Sales</div>
    <div>🎁 Packages</div>
</nav>

</body>
</html>
