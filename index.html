<!DOCTYPE html>
<html dir="rtl" lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Legend Party - Professional Services</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background-color: #f4f4f4; margin: 0; padding: 20px; }
        header { text-align: center; padding: 30px; background: linear-gradient(135deg, #1e3c72, #2a5298); color: white; border-radius: 20px; margin-bottom: 30px; }
        
        .section-header { text-align: center; margin-top: 40px; margin-bottom: 20px; }
        .section-header h2 { font-size: 24px; color: #2a5298; margin: 0; }
        .section-header p { font-size: 14px; color: #666; margin: 5px 0; font-weight: 300; }
        
        .gallery { display: grid; grid-template-columns: repeat(auto-fill, minmax(150px, 1fr)); gap: 15px; }
        .gallery img { width: 100%; height: 160px; object-fit: cover; border-radius: 15px; border: 3px solid #fff; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        
        .cta-btn { display: block; width: 90%; max-width: 300px; margin: 50px auto; padding: 15px; background: #25D366; color: white; text-align: center; text-decoration: none; border-radius: 50px; font-weight: bold; font-size: 20px; }
        .cta-sub { display: block; text-align: center; font-size: 16px; color: #555; margin-top: -40px; margin-bottom: 40px; }
    </style>
</head>
<body>

<header>
    <h1>LEGEND PARTY</h1>
    <p>Professional Event Planning Services</p>
</header>

<div id="sections"></div>

<a href="https://wa.me/201148537547" class="cta-btn">Book Your Party Now</a>
<span class="cta-sub">احجز معانا حفلتك</span>

<script>
    const data = {
        "MASCOTS & BIG INFLATABLES 🎭": { id: "mascots", subtitle: "قسم مسكات ونفخ عملاقة", images: [] },
        "ENGAGEMENT & PARTY 💍": { id: "engagement", subtitle: "قسم خطوبة وقراية فاتحة", images: [] },
        "BIRTHDAY & SEBOO' 🎂": { id: "birthdays", subtitle: "قسم سبوع وأعياد ميلاد", images: [] },
        "AFRICAN & NUBIAN SHOW 🥁": { id: "african", subtitle: "قسم شو أفريقي ونوبي", images: [] },
        "FULL CLOWN SHOW 🤡": { id: "clowns", subtitle: "قسم كلاون كامل", images: [] },
        "GIANT JUMPERS 🏰": { id: "jumpers", subtitle: "قسم نطاطات كبيرة", images: [] },
        "FOAM PARTY 🫧": { id: "foam", subtitle: "قسم فوم بارتي كامل", images: [] }
    };

    const container = document.getElementById('sections');
    for (let title in data) {
        let section = data[title];
        container.innerHTML += `
            <div class="section-header">
                <h2>${title}</h2>
                <p>${section.subtitle}</p>
            </div>
            <div class="gallery" id="${section.id}"></div>
        `;
        
        section.images.forEach(img => {
            document.getElementById(section.id).innerHTML += `<img src="${img}">`;
        });
    }
</script>

</body>
</html>
