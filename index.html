<!DOCTYPE html>
<html dir="ltr" lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Legend Party - Store</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: linear-gradient(135deg, #fdfcfb 0%, #ffeaa7 100%); margin: 0; padding-bottom: 120px; background-image: url('30.jpg'); background-repeat: repeat-y; background-size: 80px auto; background-position: right top; }
        header { text-align: center; padding: 20px; background: rgba(255,255,255,0.9); border-bottom: 5px solid #ff7675; }
        .logo { width: 100px; height: 100px; border-radius: 50%; border: 4px solid #ff7675; }
        .section-title { padding: 20px 15px; font-size: 22px; font-weight: bold; color: #d63031; text-align: center; }
        
        .grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 15px; padding: 0 15px; }
        .box { background: white; padding: 10px; border-radius: 20px; text-align: center; box-shadow: 0 8px 0 #fab1a0; }
        .box img { width: 100%; height: 110px; object-fit: cover; border-radius: 15px; }
        
        .pkg { background: #74b9ff; color: white; padding: 20px; margin: 10px 15px; border-radius: 20px; text-align: center; font-weight: bold; border: 3px dashed white; }
        .pkg.vip { background: #fdcb6e; }
        .pkg.legend { background: #e17055; }

        .sales-box { background: #a29bfe; color: white; padding: 40px; margin: 15px; border-radius: 30px; text-align: center; font-size: 24px; border: 5px solid white; box-shadow: 0 10px 0 #6c5ce7; }
        
        .bottom-nav { position: fixed; bottom: 0; width: 100%; background: #2d3436; color: white; display: flex; justify-content: space-around; padding: 15px 0; z-index: 1000; font-size: 14px; font-weight: bold; }
        .nav-item { cursor: pointer; text-align: center; }
    </style>
</head>
<body>

<header>
    <img src="6.png" class="logo" alt="Logo">
    <h1 style="color: #2d3436; margin: 5px 0;">LEGEND PARTY</h1>
    <div style="color: #d63031; font-style: italic;">We make fun memories!</div>
</header>

<!-- قسم المتجر -->
<div id="storeSection">
    <div class="section-title">🎪 Our Services 🎪</div>
    <div class="grid" id="menu"></div>
</div>

<!-- قسم سيلز شوب -->
<div id="salesSection" style="display:none;">
    <div class="section-title">🛍️ SALES SHOP 🛍️</div>
    <div class="sales-box">🎭 MASCOTS & CLOWNS<br>For Sale</div>
    <p style="text-align: center; color: #636e72;">Professional costumes and gear available now.</p>
</div>

<!-- قسم البكيدجات -->
<div id="packageSection" style="display:none;">
    <div class="section-title">🎁 Our Packages 🎁</div>
    <div class="pkg">Standard (العادي)</div>
    <div class="pkg vip">VIP Package</div>
    <div class="pkg legend">LEGEND PARTY Package</div>
</div>

<nav class="bottom-nav">
    <div class="nav-item" onclick="show('storeSection')">🛒 Store</div>
    <div class="nav-item" onclick="show('salesSection')">🏷️ Sales Shop</div>
    <div class="nav-item" onclick="show('packageSection')">🎁 Packages</div>
</nav>

<script>
    function show(id) {
        document.getElementById('storeSection').style.display = (id === 'storeSection') ? 'block' : 'none';
        document.getElementById('salesSection').style.display = (id === 'salesSection') ? 'block' : 'none';
        document.getElementById('packageSection').style.display = (id === 'packageSection') ? 'block' : 'none';
    }

    const store = [
        { en: "FOAM PARTY", img: "7.jpg" },
        { en: "BIRTHDAY", img: "8.jpg" },
        { en: "MAGICIAN", img: "9.jpg" },
        { en: "MASCOTS", img: "1.jpg" },
        { en: "CLOWN", img: "2.jpg" },
        { en: "ENGAGEMENT", img: "3.jpg" },
        { en: "AFRICAN & NUBIAN", img: "4.jpg" },
        { en: "JUMPERS", img: "5.jpg" }
    ];

    const menu = document.getElementById('menu');
    store.forEach(item => {
        menu.innerHTML += `<div class="box"><img src="${item.img}"><h3>${item.en}</h3></div>`;
    });
</script>

</body>
</html>
