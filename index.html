<!DOCTYPE html>
<html dir="rtl" lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Legend Party</title>
    <style>
        body { font-family: sans-serif; background-color: #f4f4f4; margin: 0; padding: 20px; }
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        .card { background: white; padding: 10px; border-radius: 10px; text-align: center; cursor: pointer; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        .card img { width: 100%; height: 100px; object-fit: cover; border-radius: 5px; }
        #gallery { display: none; padding-top: 20px; }
        .back-btn { display: block; width: 100%; padding: 10px; background: #333; color: white; border: none; border-radius: 5px; margin-bottom: 20px; }
    </style>
</head>
<body>

<div id="home">
    <h2 style="text-align:center;">Legend Party</h2>
    <div class="grid" id="menu"></div>
</div>

<div id="gallery">
    <button class="back-btn" onclick="goBack()">رجوع</button>
    <div class="grid" id="pics"></div>
</div>

<script>
    const data = {
        "اينجيمنت": ["22.jpg", "23.jpg", "24.jpg", "25.jpg"],
        "المسكات": ["26.jpg", "27.jpg"],
        "الجمب": ["28.jpg", "30.jpg"],
        "باكيدج عادي": ["31.jpg", "34.jpg"],
        "باكيدج ليجيند": ["32.jpg"],
        "باكيدج VIP": ["33.jpg"],
        "فوم بارتي": ["35.jpg", "36.jpg"],
        "افريقي ونوبي": ["37.jpg", "38.jpg"]
    };

    function showGallery(name) {
        document.getElementById('home').style.display = 'none';
        document.getElementById('gallery').style.display = 'block';
        const pics = document.getElementById('pics');
        pics.innerHTML = '';
        data[name].forEach(img => {
            pics.innerHTML += `<div class="card"><img src="${img}"></div>`;
        });
    }

    function goBack() {
        document.getElementById('home').style.display = 'block';
        document.getElementById('gallery').style.display = 'none';
    }

    const menu = document.getElementById('menu');
    for (let key in data) {
        menu.innerHTML += `<div class="card" onclick="showGallery('${key}')"><img src="${data[key][0]}"><h3>${key}</h3></div>`;
    }
</script>
</body>
</html>
