<!DOCTYPE html>
<html dir="rtl" lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Legend Party - Catalog</title>
    <style>
        body { font-family: 'Cairo', sans-serif; background-color: #f0f2f5; margin: 0; padding: 15px; }
        header { text-align: center; padding: 25px; background: linear-gradient(45deg, #FF6B6B, #FFD93D); color: white; border-radius: 25px; margin-bottom: 25px; box-shadow: 0 10px 20px rgba(0,0,0,0.1); }
        
        .grid-container { display: grid; grid-template-columns: repeat(2, 1fr); gap: 15px; }
        
        .box { background: white; padding: 20px; border-radius: 20px; text-align: center; box-shadow: 0 5px 15px rgba(0,0,0,0.05); transition: 0.3s; border: 2px solid transparent; }
        .box:hover { border-color: #FF6B6B; transform: translateY(-5px); }
        
        .box h3 { margin: 0; font-size: 16px; color: #333; }
        .box p { margin: 5px 0 0; font-size: 12px; color: #888; font-weight: 300; }
        
        .cta-btn { display: block; width: 100%; margin: 40px 0; padding: 15px; background: #25D366; color: white; text-align: center; text-decoration: none; border-radius: 50px; font-weight: bold; font-size: 18px; }
    </style>
</head>
<body>

<header>
    <h1>LEGEND PARTY</h1>
    <p>Professional Event Planning Services</p>
</header>

<div class="grid-container" id="menu"></div>

<a href="https://wa.me/201148537547" class="cta-btn">Book Your Party Now | احجز حفلتك الآن</a>

<script>
    const menu = [
        { en: "MASCOTS & INFLATABLES 🎭", ar: "مسكات ونفخ عملاقة" },
        { en: "ENGAGEMENT & PARTY 💍", ar: "خطوبة وقراية فاتحة" },
        { en: "BIRTHDAY & SEBOO' 🎂", ar: "سبوع وأعياد ميلاد" },
        { en: "AFRICAN & NUBIAN SHOW 🥁", ar: "شو أفريقي ونوبي" },
        { en: "FULL CLOWN SHOW 🤡", ar: "كلاون كامل" },
        { en: "GIANT JUMPERS 🏰", ar: "نطاطات كبيرة" },
        { en: "FOAM PARTY 🫧", ar: "فوم بارتي" }
    ];

    const container = document.getElementById('menu');
    menu.forEach(item => {
        container.innerHTML += `
            <div class="box">
                <h3>${item.en}</h3>
                <p>${item.ar}</p>
            </div>
        `;
    });
</script>

</body>
</html>
