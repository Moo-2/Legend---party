<!DOCTYPE html>
<html dir="ltr" lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Legend Party - Professional Gallery</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: linear-gradient(135deg, #fdfcfb 0%, #ffeaa7 100%); margin: 0; padding-bottom: 150px; background-image: url('30.jpg'); background-repeat: repeat-y; background-size: 80px auto; background-position: right top; }
        header { text-align: center; padding: 20px; background: rgba(255,255,255,0.9); border-bottom: 5px solid #ff7675; }
        .logo { width: 100px; height: 100px; border-radius: 50%; border: 4px solid #ff7675; }
        .section-title { padding: 20px 15px; font-size: 22px; font-weight: bold; color: #d63031; text-align: center; }
        
        .grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 15px; padding: 0 15px; }
        .box { background: white; padding: 10px; border-radius: 20px; text-align: center; box-shadow: 0 8px 0 #fab1a0; cursor: pointer; }
        .box img { width: 100%; height: 110px; object-fit: cover; border-radius: 15px; }
        
        #galleryView, #salesView { padding: 15px; display: none; }
        .gallery-grid { display: grid; grid-template-columns: 1fr; gap: 15px; }
        .gallery-grid img { width: 100%; border-radius: 20px; box-shadow: 0 4px 10px rgba(0,0,0,0.2); }

        .pkg { background: #74b9ff; color: white; padding: 20px; margin: 10px 15px; border-radius: 20px; text-align: center; font-weight: bold; border: 3px dashed white; }
        .contact-bar { display: flex; gap: 10px; padding: 0 15px 10px 15px; position: fixed; bottom: 80px; width: 90%; z-index: 999; }
        .whatsapp-btn { flex: 3; background: #25D366; color: white; padding: 12px; border-radius: 50px; text-align: center; font-weight: bold; text-decoration: none; box-shadow: 0 4px 0 #128c7e; }
        .call-btn { flex: 1; background: #0984e3; color: white; padding: 12px; border-radius: 50%; text-align: center; font-weight: bold; text-decoration: none; box-shadow: 0 4px 0 #0773c3; }
        .bottom-nav { position: fixed; bottom: 0; width: 100%; background: #2d3436; color: white; display: flex; justify-content: space-around; padding: 15px 0; z-index: 1000; font-weight: bold; }
        .nav-item { cursor: pointer; }
    </style>
</head>
<body>

<header>
    <img src="6.png" class="logo" alt="Logo">
    <h1 style="color: #2d3436; margin: 5px 0;">LEGEND PARTY</h1>
    <div style="color: #d63031; font-style: italic;">We make fun memories!</div>
</header>

<div id="mainContent">
    <div id="storeSection">
        <div class="section-title">🎪 Our Services 🎪</div>
        <div class="grid" id="menu"></div>
    </div>
    
    <div id="galleryView">
        <div class="section-title" id="galleryTitle"></div>
        <div class="gallery-grid" id="galleryImages"></div>
        <button onclick="showSection('storeSection')" style="width:100%; padding:15px; margin-top:20px; background:#ff7675; color:white; border:none; border-radius:15px; font-weight:bold;">Back</button>
    </div>

    <div id="salesView">
        <div class="section-title">🛍️ SALES SHOP 🛍️</div>
        <div class="gallery-grid" id="salesImages"></div>
        <button onclick="showSection('storeSection')" style="width:100%; padding:15px; margin-top:20px; background:#a29bfe; color:white; border:none; border-radius:15px; font-weight:bold;">Back</button>
    </div>
</div>

<div id="packageSection" style="display:none;">
    <div class="section-title">🎁 Our Packages 🎁</div>
    <div class="pkg">Standard (العادي)</div>
    <div class="pkg" style="background:#fdcb6e;">VIP Package</div>
    <div class="pkg" style="background:#e17055;">LEGEND PARTY Package</div>
</div>

<div class="contact-bar">
    <a href="https://wa.me/201148537547" class="whatsapp-btn">Book Now 📱</a>
    <a href="tel:01148537547" class="call-btn">📞</a>
</div>

<nav class="bottom-nav">
    <div class="nav-item" onclick="showSection('storeSection')">🛒 Store</div>
    <div class="nav-item" onclick="showSection('salesView')">🏷️ Sales</div>
    <div class="nav-item" onclick="showSection('packageSection')">🎁 Packages</div>
</nav>

<script>
    const galleryData = {
        "MASCOTS": ["11.jpg", "12.jpg", "13.jpg", "14.jpg", "15.jpg", "16.jpg", "17.jpg"],
        "CLOWN": ["18.jpg", "19.jpg", "20.jpg", "21.jpg"]
    };

    const allSalesImages = ["11.jpg", "12.jpg", "13.jpg", "14.jpg", "15.jpg", "16.jpg", "17.jpg", "18.jpg", "19.jpg", "20.jpg", "21.jpg"];

    function showSection(id) {
        document.getElementById('storeSection').style.display = (id === 'storeSection') ? 'block' : 'none';
        document.getElementById('packageSection').style.display = (id === 'packageSection') ? 'block' : 'none';
        document.getElementById('galleryView').style.display = 'none';
        document.getElementById('salesView').style.display = (id === 'salesView') ? 'block' : 'none';
        
        if(id === 'salesView') {
            const container = document.getElementById('salesImages');
            container.innerHTML = "";
            allSalesImages.forEach(src => { container.innerHTML += `<img src="${src}">`; });
        }
    }

    function openGallery(name) {
        document.getElementById('storeSection').style.display = 'none';
        document.getElementById('galleryView').style.display = 'block';
        document.getElementById('galleryTitle').innerText = name;
        const container = document.getElementById('galleryImages');
        container.innerHTML = "";
        galleryData[name].forEach(src => { container.innerHTML += `<img src="${src}">`; });
    }

    const store = [
        { en: "FOAM PARTY", img: "7.jpg" },
        { en: "BIRTHDAY", img: "8.jpg" },
        { en: "MAGICIAN", img: "9.jpg" },
        { en: "MASCOTS", img: "11.jpg", gallery: true },
        { en: "CLOWN", img: "18.jpg", gallery: true },
        { en: "ENGAGEMENT", img: "3.jpg" },
        { en: "AFRICAN & NUBIAN", img: "4.jpg" },
        { en: "JUMPERS", img: "5.jpg" }
    ];

    const menu = document.getElementById('menu');
    store.forEach(item => {
        let onClick = item.gallery ? `onclick="openGallery('${item.en}')"` : "";
        menu.innerHTML += `<div class="box" ${onClick}><img src="${item.img}"><h3>${item.en}</h3></div>`;
    });
</script>
</body>
</html>
